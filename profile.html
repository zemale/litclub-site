<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — ЛитКлуб 📚</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <style>
    .profile-header {
      background: linear-gradient(135deg, var(--color-primary), var(--color-dark));
      color: var(--color-cream);
      padding: 40px 20px;
      text-align: center;
    }
    .avatar {
      width: 100px;
      height: 100px;
      background: var(--color-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 20px;
      border: 4px solid var(--color-cream);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .stat-card {
      background: var(--color-paper);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      border: 2px solid var(--color-primary);
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--color-primary);
    }
    .stat-label {
      font-size: 0.9rem;
      color: var(--color-text-light);
    }
    .achievements {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .achievement-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .achievement {
      background: var(--color-paper);
      padding: 15px;
      border-radius: var(--radius);
      border: 2px solid var(--color-primary);
      opacity: 0.5;
    }
    .achievement.unlocked {
      opacity: 1;
      border-color: var(--color-secondary);
      background: linear-gradient(135deg, var(--color-paper), rgba(46,139,87,0.1));
    }
    .achievement-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .progress-section {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .progress-bar {
      height: 30px;
      background: rgba(139,69,19,0.2);
      border-radius: 15px;
      overflow: hidden;
      margin: 20px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      transition: width 0.5s ease;
    }
    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">📚 ЛитКлуб</a>
      <div class="nav-links">
        <a href="profile.html" class="active">👤 Профиль</a>
      </div>
    </div>
  </nav>

  <header class="profile-header">
    <div class="avatar">📖</div>
    <h1>Литературовед</h1>
    <p>Уровень <span id="level">1</span></p>
  </header>

  <section class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="xp">0</div>
      <div class="stat-label">XP</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="books">0</div>
      <div class="stat-label">Книг прочитано</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="quests">0</div>
      <div class="stat-label">Квестов пройдено</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="streak">0</div>
      <div class="stat-label">Дней подряд</div>
    </div>
  </section>

  <section class="progress-section">
    <h2>Прогресс к следующему уровню</h2>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-bar" style="width: 0%">0%</div>
    </div>
  </section>

  <section class="achievements">
    <h2>🏆 Достижения</h2>
    <div class="achievement-list" id="achievements">
      <!-- Achievements loaded dynamically -->
    </div>
  </section>

  <script src="js/storage.js"></script>
  <script>
    const achievements = [
      { id: 'first_book', icon: '📚', name: 'Первые шаги', desc: 'Прочитать первое произведение' },
      { id: 'ten_books', icon: '📖', name: 'Читатель', desc: 'Прочитать 10 произведений' },
      { id: 'fifty_books', icon: '🏛️', name: 'Библиофил', desc: 'Прочитать 50 произведений' },
      { id: 'first_quest', icon: '🎮', name: 'Искатель', desc: 'Пройти первый квест' },
      { id: 'quest_master', icon: '🏅', name: 'Мастер квестов', desc: 'Пройти 10 квестов' },
      { id: 'week_streak', icon: '🔥', name: 'Неделя огня', desc: '7 дней подряд' },
      { id: 'month_streak', icon: '⭐', name: 'Легенда', desc: '30 дней подряд' },
      { id: 'level_5', icon: '🎓', name: 'Знаток', desc: 'Достичь 5 уровня' },
      { id: 'level_10', icon: '👑', name: 'Гуру', desc: 'Достичь 10 уровня' }
    ];

    function updateProfile() {
      const progress = window.LitClubStorage.getProgress();
      
      document.getElementById('level').textContent = progress.level;
      document.getElementById('xp').textContent = progress.xp;
      document.getElementById('books').textContent = progress.totalWorksRead;
      document.getElementById('quests').textContent = progress.totalQuestsCompleted;
      document.getElementById('streak').textContent = progress.streak;
      
      // Calculate XP needed for next level
      const xpNeeded = progress.level * 100;
      const xpPercent = Math.round((progress.xp / xpNeeded) * 100);
      const progressBar = document.getElementById('progress-bar');
      progressBar.style.width = xpPercent + '%';
      progressBar.textContent = xpPercent + '%';
      
      // Render achievements
      const achievementsContainer = document.getElementById('achievements');
      achievementsContainer.innerHTML = achievements.map(ach => {
        const unlocked = progress.achievements.includes(ach.id);
        return `
          <div class="achievement ${unlocked ? 'unlocked' : ''}">
            <div class="achievement-icon">${ach.icon}</div>
            <div style="font-weight: 700;">${ach.name}</div>
            <div style="font-size: 0.85rem; color: var(--color-text-light);">${ach.desc}</div>
          </div>
        `;
      }).join('');
    }

    // Check and update achievements
    window.LitClubStorage.checkAchievements();
    updateProfile();
  </script>
</body>
</html>
